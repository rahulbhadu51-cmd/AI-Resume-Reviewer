<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Resume Reviewer</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar">

        <div class="logo">

            🤖 AI Resume Reviewer

        </div>

        <ul class="nav-links">

            <li><a href="#">Home</a></li>

            <li><a href="#">Features</a></li>

            <li><a href="#">About</a></li>

        </ul>

    </nav>

    <!-- ================= MAIN ================= -->

    <div class="container">

        <h1>

            Analyze Your Resume with AI

        </h1>

        <p class="subtitle">

            Upload your resume, paste the job description and receive an ATS
            Score, matched skills, missing skills and AI-powered suggestions.

        </p>

        <label>

            📄 Select Resume (PDF)

        </label>

        <input
            type="file"
            id="resume"
            accept=".pdf"
        >

        <label>

            💼 Job Description

        </label>

        <textarea
            id="job"
            rows="10"
            placeholder="Paste Job Description Here..."
        ></textarea>

        <button id="analyzeBtn">

            🚀 Analyze Resume

        </button>

        <!-- RESULT -->

        <div id="result"></div>

    </div>

    <!-- jsPDF -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- JS -->

    <script src="script.js"></script>

</body>

</html>
